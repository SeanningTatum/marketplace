<svg xmlns="http://www.w3.org/2000/svg" width="900" height="490" viewBox="0 0 900 490" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <style>.mono{font-size:13px;white-space:pre}</style>
  <rect width="900" height="490" rx="10" fill="#1e2127"/>
  <path d="M0 10a10 10 0 0 1 10-10h880a10 10 0 0 1 10 10v26H0z" fill="#2c313a"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="450" y="22" text-anchor="middle" fill="#5c6370" font-size="12">/pr-format — the generated PR body</text>
  <text x="884" y="22" text-anchor="end" fill="#5c6370" font-size="10" font-style="italic">example output</text>
  <text x="20" y="67.0" xml:space="preserve" class="mono"><tspan fill="#c678dd">$ </tspan><tspan fill="#d8dee9">/pr-format</tspan></text>
  <text x="20" y="87.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9"></tspan></text>
  <text x="20" y="107.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9" font-weight="bold">## Why</tspan></text>
  <text x="20" y="127.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9">Uploads over 5 MB failed silently — the client never saw an error. </tspan><tspan fill="#61afef">(#812)</tspan></text>
  <text x="20" y="147.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9"></tspan></text>
  <text x="20" y="167.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9" font-weight="bold">## What</tspan></text>
  <text x="20" y="187.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9">- Upload errors now surface a toast with the failure reason</tspan></text>
  <text x="20" y="207.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9">- Retries transient 5xx once before giving up</tspan></text>
  <text x="20" y="227.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9"></tspan></text>
  <text x="20" y="247.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9" font-weight="bold">## How</tspan></text>
  <text x="20" y="267.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9">Wraps the upload call in </tspan><tspan fill="#e5c07b">withRetry()</tspan><tspan fill="#d8dee9"> (</tspan><tspan fill="#5c6370">lib/http.ts</tspan><tspan fill="#d8dee9">) — one retry, 5xx only, so a</tspan></text>
  <text x="20" y="287.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9">flaky edge doesn't fail the whole upload. Chosen over a queue: no new infra.</tspan></text>
  <text x="20" y="307.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9"></tspan></text>
  <text x="20" y="327.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9" font-weight="bold">## Verification</tspan></text>
  <text x="20" y="347.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9">- </tspan><tspan fill="#e5c07b">npm test upload</tspan><tspan fill="#d8dee9"> → </tspan><tspan fill="#98c379">7 passed</tspan></text>
  <text x="20" y="367.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9">- Manual: throttled to 3G, uploaded 8 MB file → saw retry then success toast</tspan></text>
  <text x="20" y="387.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9"></tspan></text>
  <text x="20" y="407.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9" font-weight="bold">## Caveats</tspan></text>
  <text x="20" y="427.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9">None — retry is capped at 1 and only on 5xx, so no risk of amplifying load.</tspan></text>
  <text x="20" y="447.0" xml:space="preserve" class="mono"><tspan fill="#d8dee9"></tspan></text>
  <text x="20" y="467.0" xml:space="preserve" class="mono"><tspan fill="#98c379">✓ PR created → </tspan><tspan fill="#61afef">https://github.com/acme/app/pull/813</tspan></text>
</svg>
