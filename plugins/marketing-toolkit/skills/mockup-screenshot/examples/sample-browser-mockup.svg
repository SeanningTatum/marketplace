<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Browser chrome — copied unchanged from lib/browser-mockup-template.svg -->
  <rect width="900" height="460" rx="10" fill="#e8eaed"/>
  <path d="M0 10a10 10 0 0 1 10-10h880a10 10 0 0 1 10 10v36H0z" fill="#dee1e6"/>
  <circle cx="20" cy="23" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="23" r="6" fill="#febc2e"/>
  <circle cx="60" cy="23" r="6" fill="#28c840"/>
  <rect x="84" y="10" width="620" height="26" rx="13" fill="#ffffff"/>
  <text x="100" y="27" font-size="12" fill="#5f6368">https://app.example.com/settings/billing</text>
  <text x="884" y="27" text-anchor="end" font-size="10" font-style="italic" fill="#80868b">example output</text>

  <!-- Page canvas -->
  <rect x="0" y="46" width="900" height="414" fill="#ffffff"/>

  <!--
    Everything below is the "replace the placeholder" part — real content
    primitives (text/rect/circle), not abstract boxes. This is the pattern
    to copy for your own freehand mockup.
  -->
  <text x="48" y="94" font-size="22" font-weight="bold" fill="#1a1a1a">Billing</text>
  <text x="48" y="118" font-size="13" fill="#6b7280">Manage your plan and payment method.</text>

  <!-- plan card -->
  <rect x="48" y="140" width="804" height="86" rx="8" fill="#f7f8fa" stroke="#e5e7eb"/>
  <text x="68" y="170" font-size="14" font-weight="bold" fill="#1a1a1a">Pro plan</text>
  <text x="68" y="190" font-size="12" fill="#6b7280">$29/mo · renews Aug 15, 2026</text>
  <rect x="742" y="160" width="90" height="34" rx="6" fill="#2563eb"/>
  <text x="787" y="182" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Upgrade</text>

  <!-- invoice table -->
  <text x="48" y="256" font-size="14" font-weight="bold" fill="#1a1a1a">Recent invoices</text>
  <line x1="48" y1="270" x2="852" y2="270" stroke="#e5e7eb"/>
  <text x="48" y="292" font-size="12" fill="#6b7280">Date</text>
  <text x="220" y="292" font-size="12" fill="#6b7280">Amount</text>
  <text x="380" y="292" font-size="12" fill="#6b7280">Status</text>
  <text x="742" y="292" font-size="12" fill="#6b7280">Download</text>
  <line x1="48" y1="304" x2="852" y2="304" stroke="#f1f2f4"/>

  <text x="48" y="326" font-size="12" fill="#1a1a1a">Jul 15, 2026</text>
  <text x="220" y="326" font-size="12" fill="#1a1a1a">$29.00</text>
  <rect x="380" y="313" width="58" height="20" rx="10" fill="#dcfce7"/>
  <text x="409" y="327" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">Paid</text>
  <text x="742" y="326" font-size="12" fill="#2563eb">PDF ↓</text>
  <line x1="48" y1="338" x2="852" y2="338" stroke="#f1f2f4"/>

  <text x="48" y="360" font-size="12" fill="#1a1a1a">Jun 15, 2026</text>
  <text x="220" y="360" font-size="12" fill="#1a1a1a">$29.00</text>
  <rect x="380" y="347" width="58" height="20" rx="10" fill="#dcfce7"/>
  <text x="409" y="361" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">Paid</text>
  <text x="742" y="360" font-size="12" fill="#2563eb">PDF ↓</text>
  <line x1="48" y1="372" x2="852" y2="372" stroke="#f1f2f4"/>

  <text x="48" y="394" font-size="12" fill="#1a1a1a">May 15, 2026</text>
  <text x="220" y="394" font-size="12" fill="#1a1a1a">$29.00</text>
  <rect x="380" y="381" width="58" height="20" rx="10" fill="#fef3c7"/>
  <text x="409" y="395" text-anchor="middle" font-size="10" fill="#92400e" font-weight="bold">Due</text>
  <text x="742" y="394" font-size="12" fill="#2563eb">PDF ↓</text>
